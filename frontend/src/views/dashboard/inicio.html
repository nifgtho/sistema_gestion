<div class="card" style="margin-bottom: 20px;">
    <h2 style="font-size: 1.5rem; color: #0056b3; border-bottom: none; margin-bottom: 5px;">
        Bienvenido al Sistema SAE
    </h2>
    <p style="color: #6c757d; font-size: 0.95rem;">
        Panel de control principal. Aquí tienes un resumen en tiempo real del estado de tu base de datos.
    </p>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px;">
    
    <div class="card" onclick="cargarVista('detalle_registro')" style="border-left: 4px solid #0056b3; margin-bottom: 0; padding: 20px; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 style="color: #6c757d; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px;">Total Registros</h3>
                <span style="font-size: 2.2rem; font-weight: bold; color: #343a40;" id="metric-registros">
                    <i class="fas fa-spinner fa-spin" style="font-size: 1.2rem; color: #ccc;"></i>
                </span>
            </div>
            <div style="background: rgba(0, 86, 179, 0.1); padding: 15px; border-radius: 50%; color: #0056b3;">
                <i class="fas fa-file-contract fa-2x"></i>
            </div>
        </div>
    </div>

    <div class="card" onclick="cargarVista('accion')" style="border-left: 4px solid #28a745; margin-bottom: 0; padding: 20px; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 style="color: #6c757d; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px;">Acciones</h3>
                <span style="font-size: 2.2rem; font-weight: bold; color: #343a40;" id="metric-acciones">
                    <i class="fas fa-spinner fa-spin" style="font-size: 1.2rem; color: #ccc;"></i>
                </span>
            </div>
            <div style="background: rgba(40, 167, 69, 0.1); padding: 15px; border-radius: 50%; color: #28a745;">
                <i class="fas fa-tasks fa-2x"></i>
            </div>
        </div>
    </div>

    <div class="card" onclick="cargarVista('recurso_agente')" style="border-left: 4px solid #ffc107; margin-bottom: 0; padding: 20px; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 style="color: #6c757d; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px;">Agentes</h3>
                <span style="font-size: 2.2rem; font-weight: bold; color: #343a40;" id="metric-agentes">
                    <i class="fas fa-spinner fa-spin" style="font-size: 1.2rem; color: #ccc;"></i>
                </span>
            </div>
            <div style="background: rgba(255, 193, 7, 0.1); padding: 15px; border-radius: 50%; color: #ffc107;">
                <i class="fas fa-user-tie fa-2x"></i>
            </div>
        </div>
    </div>

    <div class="card" onclick="cargarVista('zona_provincia')" style="border-left: 4px solid #17a2b8; margin-bottom: 0; padding: 20px; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-5px)'" onmouseout="this.style.transform='translateY(0)'">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 style="color: #6c757d; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px;">Provincias</h3>
                <span style="font-size: 2.2rem; font-weight: bold; color: #343a40;" id="metric-zonas">
                    <i class="fas fa-spinner fa-spin" style="font-size: 1.2rem; color: #ccc;"></i>
                </span>
            </div>
            <div style="background: rgba(23, 162, 184, 0.1); padding: 15px; border-radius: 50%; color: #17a2b8;">
                <i class="fas fa-map-marked-alt fa-2x"></i>
            </div>
        </div>
    </div>

</div>

<div class="card">
    <h2><i class="fas fa-bolt" style="color: #ffc107;"></i> Accesos Rápidos</h2>
    <p style="color: #6c757d; margin-bottom: 15px; font-size: 0.9rem;">Navega rápidamente a los módulos más utilizados del sistema.</p>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
        <button class="btn btn-primary" onclick="cargarVista('detalle_registro')" style="justify-content: flex-start; padding: 15px; font-size: 1.05rem; background: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer;">
            <i class="fas fa-plus-circle"></i> Nuevo Registro SAE
        </button>
        
        <button class="btn" onclick="cargarVista('accion')" style="background-color: #2c3e50; color: white; justify-content: flex-start; padding: 15px; font-size: 1.05rem; border: none; border-radius: 5px; cursor: pointer;">
            <i class="fas fa-tasks"></i> Catálogo Acciones
        </button>

        <button class="btn" onclick="cargarVista('zona_provincia')" style="background-color: #2c3e50; color: white; justify-content: flex-start; padding: 15px; font-size: 1.05rem; border: none; border-radius: 5px; cursor: pointer;">
            <i class="fas fa-map"></i> Gestionar Zonas
        </button>
    </div>
</div>

<script>
    /**
     * Lógica de la vista Dashboard.
     * Exportada a window para que el inyector del sidebar pueda ejecutarla.
     */
    window.inicializarModulo = async function(vistaID) {
        if (vistaID !== 'dashboard') return;

        try {
            // 1. Usamos el diccionario de Endpoints globales (¡Adiós errores 404!)
            const [registros, acciones, agentes, zonas] = await Promise.all([
                App.peticionAPI(Endpoints.REGISTRO.BASE),
                App.peticionAPI(Endpoints.ACCION),
                App.peticionAPI(Endpoints.RECURSO.AGENTE),
                App.peticionAPI(Endpoints.ZONA.PROVINCIA)
            ]);

            // 2. Extraemos la longitud de los arreglos con validación segura
            const totalRegistros = (registros && Array.isArray(registros)) ? registros.length : 0;
            const totalAcciones = (acciones && Array.isArray(acciones)) ? acciones.length : 0;
            const totalAgentes = (agentes && Array.isArray(agentes)) ? agentes.length : 0;
            const totalZonas = (zonas && Array.isArray(zonas)) ? zonas.length : 0;

            // 3. Ejecutamos la animación
            animarContador('metric-registros', totalRegistros);
            animarContador('metric-acciones', totalAcciones);
            animarContador('metric-agentes', totalAgentes);
            animarContador('metric-zonas', totalZonas);

        } catch (error) {
            console.error("Error cargando métricas del Dashboard:", error);
            document.getElementById('metric-registros').innerHTML = `<span style="color:#dc3545; font-size:1rem;">Error BD</span>`;
            document.getElementById('metric-acciones').innerHTML = `<span style="color:#dc3545; font-size:1rem;">Error BD</span>`;
            document.getElementById('metric-agentes').innerHTML = `<span style="color:#dc3545; font-size:1rem;">Error BD</span>`;
            document.getElementById('metric-zonas').innerHTML = `<span style="color:#dc3545; font-size:1rem;">Error BD</span>`;
        }
    };

    /**
     * Función utilitaria para animar los números.
     */
    function animarContador(idElemento, total) {
        const elemento = document.getElementById(idElemento);
        if (!elemento) return; // Validación de seguridad

        if (total === 0) {
            elemento.textContent = '0';
            return;
        }

        let cuentaActual = 0;
        const incremento = Math.ceil(total / 30); 
        
        const intervalo = setInterval(() => {
            cuentaActual += incremento;
            if (cuentaActual >= total) {
                cuentaActual = total;
                clearInterval(intervalo);
            }
            elemento.textContent = cuentaActual;
        }, 30); 
    }
</script>
